# 3D Segmentation Training Configuration
# Usage: python -m segtask_v1.train --config configs/seg3d.yaml

data:
  image_dir: "F:/med_data/Totalsegmentator_dataset_v201/small_data/nii"
  label_dir: "F:/med_data/Totalsegmentator_dataset_v201/small_data/mask"
  image_suffix: ".nii.gz"
  label_suffix: ".nii.gz"

  # Label values: auto-detected if empty. [0, 1, 2] = bg + 2 fg classes.
  label_values: []
  num_classes: 0

  # 3D patch size [D, H, W]
  patch_size: [64, 128, 128]

  # Patch extraction mode: "z_axis" or "cubic"
  #   z_axis: slide along z-axis, extract D slices, resize H,W
  #   cubic:  sample center (x,y,z), extract full 3D cube
  patch_mode: "z_axis"

  # Augmentation oversample ratio (cubic mode only).
  # Extract larger cube, augment, then center-crop to patch_size.
  # Avoids blank edges from spatial transforms. 1.0 = disabled, 1.4 recommended.
  aug_oversample_ratio: 1.0

  # Intensity windowing (CT HU range)
  intensity_min: -1024.0
  intensity_max: 1024.0
  normalize: "minmax"

  # Train/val split
  val_ratio: 0.2
  split_seed: 42

  # DataLoader
  batch_size: 2
  num_workers: 4
  pin_memory: true

  # Foreground oversampling
  foreground_oversample_ratio: 0.5
  samples_per_volume: 8

  # Cache volumes in memory for speed
  cache_mode: "memory"

augment:
  enabled: true

  # --- Spatial (per-sample independent) ---
  random_flip_prob: 0.5
  random_flip_axes: [2, 3, 4]

  # Affine: rotation (degrees) + scale, composed into one grid_sample
  random_affine_prob: 0.3
  random_rotate_range: [-15.0, 15.0]
  random_scale_range: [0.85, 1.15]

  # Elastic deformation
  elastic_deform_prob: 0.2
  elastic_deform_sigma: 5.0
  elastic_deform_alpha: 100.0

  # Grid dropout (mask out rectangular sub-regions)
  grid_dropout_prob: 0.0
  grid_dropout_ratio: 0.3
  grid_dropout_holes: 4

  # --- Intensity (per-sample independent) ---
  random_brightness_prob: 0.3
  random_brightness_range: [-0.1, 0.1]
  random_contrast_prob: 0.3
  random_contrast_range: [0.8, 1.2]
  random_gamma_prob: 0.2
  random_gamma_range: [0.8, 1.2]
  gaussian_noise_prob: 0.15
  gaussian_noise_std: 0.05
  gaussian_blur_prob: 0.1
  gaussian_blur_sigma: [0.5, 1.5]
  simulate_lowres_prob: 0.1
  simulate_lowres_zoom: [0.5, 1.0]

model:
  # Backbone: "resnet" or "convnext"
  backbone: "resnet"

  in_channels: 1

  # Channel progression (5 levels = 4 downsamples)
  encoder_channels: [32, 64, 128, 256, 512]

  # Blocks per encoder/decoder level
  blocks_per_level: 2

  # Normalization and activation
  norm_type: "instance"
  norm_groups: 8
  activation: "leakyrelu"
  dropout: 0.0

  # Squeeze-and-Excitation channel attention
  use_se: false
  se_reduction: 16

  # Deep supervision (multi-scale output)
  deep_supervision: false

  # Upsampling mode: transpose, 
  upsample_mode: "transpose"

  # Skip connection mode
  skip_mode: "cat"

  # Stochastic depth (ConvNeXt only)
  drop_path_rate: 0.0

loss:
  # Loss function: "dice", "bce", "dice_bce", "focal", "dice_focal", "tversky"
  name: "dice_bce"
  compound_weights: [1.0, 1.0]

  # Per-class loss weights (empty = uniform), e.g. [1.0, 1.0]
  class_weights: [1.0, 1.0]

  # Per-region spatial weights: one weight per label value (including bg).
  # e.g. for label_values=[0,1,2]: region_weights=[1.0, 2.0, 1.0]
  # means voxels with label 1 get 2x loss weight. Empty = disabled.
  region_weights: [1.0, 2.0, 1.0]

  # Dice settings
  dice_smooth: 1.0e-5
  dice_squared: false

  # Focal loss settings
  focal_alpha: 0.25
  focal_gamma: 2.0

  # Tversky settings
  tversky_alpha: 0.3
  tversky_beta: 0.7

  # Deep supervision weights
  deep_supervision_weights: [1.0, 0.5, 0.25, 0.125]

train:
  epochs: 200

  # Optimizer
  optimizer: "adamw"
  lr: 1.0e-3
  weight_decay: 1.0e-4

  # Scheduler: "cosine", "cosine_warm_restarts", "poly", "step", "plateau", "one_cycle"
  scheduler: "cosine"
  warmup_epochs: 5
  warmup_lr: 1.0e-6
  cosine_min_lr: 1.0e-6
  # Cosine warm restarts (only used when scheduler="cosine_warm_restarts")
  cosine_restart_period: 50
  cosine_restart_mult: 2

  # Gradient accumulation (effective batch = batch_size * grad_accum_steps)
  grad_accum_steps: 1

  # Gradient clipping
  grad_clip_norm: 12.0

  # Mixed precision
  use_amp: true
  amp_dtype: "float16"

  # torch.compile ("none", "default", "reduce-overhead", "max-autotune")
  compile_mode: "none"

  # EMA
  use_ema: true
  ema_decay: 0.999

  # Checkpointing
  output_dir: "outputs/seg3d_resnet"
  save_every: 10
  save_best_metric: "mean_dice"
  save_best_mode: "max"

  # Early stopping (0 = disabled)
  early_stopping: 0

  # Logging
  log_every: 10
  val_every: 1
  vis_every: 10

  # Reproducibility
  seed: 42
  deterministic: false

  # Resume from checkpoint
  resume: ""

predict:
  # Z-axis sliding window overlap ratio (0.0 = no overlap, 0.5 = 50%)
  z_overlap: 0.5

  # Blending mode: "gaussian" or "average"
  blend_mode: "gaussian"

  # Batch size for inference
  batch_size: 2

  # Test-time augmentation (flip)
  tta_flip: false

  # Binarization threshold
  threshold: 0.5

  # Output directory
  output_dir: "predictions"

  # Save probability maps
  save_probabilities: false
